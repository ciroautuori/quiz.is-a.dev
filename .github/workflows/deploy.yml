name: Deploy to Soliso VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy Container
    runs-on: [self-hosted, soliso, devquest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and restart Docker container
        run: |
          docker rm -f devquest-app devquest 2>/dev/null || true
          docker compose down --remove-orphans || true
          docker compose up -d --build --force-recreate
          docker compose ps
